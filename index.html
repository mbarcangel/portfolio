<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Portfolio</title>
</head>
<body style="
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background: linear-gradient(to right, #f5e6d3, #fff8f0);
  ">

  <!-- Header -->
  <h1 style="color: #5c3a21; font-size: 42px;">
    Mikylla Arcangel
  </h1>

  <!-- Profile Picture -->
  <img 
    src="./images/profile.jpg" 
    alt="Profile Picture"
    style="
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #5c3a21;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    "
  />

  <!-- Portfolio Description -->
  <p style="
      max-width: 600px;
      margin: 30px auto;
      font-size: 18px;
      line-height: 1.6;
      color: #4b3621;
      background-color: rgba(255,255,255,0.7);
      padding: 20px;
      border-radius: 10px;
    ">
    Hello! I am a 1st year BSIT-WMA student at FEU Diliman. 
  </p>

  <!-- Hobbies Header -->
  <h2 style="color: #5c3a21; font-size: 28px; margin-top: 40px;">
    My Hobbies
  </h2>

  <!-- Hobbies List -->
  <ul style="
      list-style: none;
      padding: 0;
      margin: 0 auto;
      font-size: 18px;
      color: #4b3621;
      background-color: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
    ">
    <li style="margin: 10px 0;">Reading Books</li>
    <li style="margin: 10px 0;">Watching shows</li>
    <li style="margin: 10px 0;">Walking</li>
    <li style="margin: 10px 0;">Playing badminton</li>
  </ul>

  <div style="margin-top: 40px;">
    <a href="mailto:youremail@example.com" style="
        text-decoration: none;
        background-color: #5c3a21;
        color: #ffffff;
        font-size: 18px;
        padding: 14px 32px;
        border-radius: 30px;
        display: inline-block;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: background-color 0.2s;
      ">
      Contact Me
    </a>
  </div>

</body>
</html>
